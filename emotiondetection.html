<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sentiment Intelligence | Noir Edition</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Core (Reliable UMD for portable environments) -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;500;700;900&display=swap');
        
        :root {
            --highlight: #ef4444;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #000000;
            color: #e5e5e5;
            overflow-x: hidden;
        }

        /* Cinematic Grain Overlay */
        .grain::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://grainy-gradients.vercel.app/noise.svg');
            opacity: 0.08;
            pointer-events: none;
            z-index: 9999;
            mix-blend-mode: overlay;
        }

        .noir-gradient {
            background: radial-gradient(ellipse at center, rgba(60,20,20,0.15) 0%, rgba(10,10,10,0.8) 60%, rgba(0,0,0,0.95) 100%);
        }

        .sharp-edge {
            border-radius: 0 !important;
        }

        .mix-diff {
            mix-blend-mode: difference;
        }

        /* Selection Color */
        ::selection {
            background: var(--highlight);
            color: white;
        }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: #09090b; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333; }

        .reveal-text {
            animation: textReveal 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes textReveal {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="grain noir-gradient">
    <div id="root"></div>

    <script type="text/babel">
        (function() {
            const { useState, useMemo, useEffect } = React;

            /**
             * LucideIconRenderer
             * Uses the core lucide icon definitions to render SVGs manually,
             * avoiding React UMD version conflicts and forwardRef errors.
             */
            const LucideIconRenderer = ({ name, className }) => {
                const [paths, setPaths] = useState([]);
                
                useEffect(() => {
                    const iconName = name.charAt(0).toLowerCase() + name.slice(1);
                    if (window.lucide && window.lucide.icons && window.lucide.icons[iconName]) {
                        // Lucide icons in UMD are [tagName, {attrs}, [children]]
                        const iconData = window.lucide.icons[iconName];
                        // iconData[1] is the array of path/circle/etc elements
                        setPaths(iconData[1] || []);
                    }
                }, [name]);

                return (
                    <svg
                        xmlns="http://www.w3.org/2000/svg"
                        width="24"
                        height="24"
                        viewBox="0 0 24 24"
                        fill="none"
                        stroke="currentColor"
                        strokeWidth="1.5"
                        strokeLinecap="round"
                        strokeLinejoin="round"
                        className={className}
                    >
                        {paths.map((item, index) => {
                            const [tag, attrs] = item;
                            const Tag = tag;
                            return <Tag key={index} {...attrs} />;
                        })}
                    </svg>
                );
            };

            const apiKey = ""; // Set your Gemini API key here

            function App() {
                const [reviews, setReviews] = useState(['', '', '']);
                const [results, setResults] = useState([]);
                const [loading, setLoading] = useState(false);
                const [summary, setSummary] = useState(null);
                const [actionPlan, setActionPlan] = useState(null);
                const [loadingSummary, setLoadingSummary] = useState(false);
                const [loadingActions, setLoadingActions] = useState(false);
                const [refiningId, setRefiningId] = useState(null);
                const [error, setError] = useState(null);
                const [activeTab, setActiveTab] = useState('input');
                const [scrollScale, setScrollScale] = useState(1);

                useEffect(() => {
                    const handleScroll = () => {
                        const scale = 1 - (window.scrollY / 2000);
                        setScrollScale(Math.max(scale, 0.89));
                    };
                    window.addEventListener('scroll', handleScroll);
                    return () => window.removeEventListener('scroll', handleScroll);
                }, []);

                const fetchWithRetry = async (url, options, retries = 5) => {
                    let delay = 1000;
                    for (let i = 0; i < retries; i++) {
                        try {
                            const response = await fetch(url, options);
                            if (!response.ok) throw new Error('Request failed');
                            return response;
                        } catch (err) {
                            if (i === retries - 1) throw err;
                            await new Promise(res => setTimeout(res, delay));
                            delay *= 2;
                        }
                    }
                };

                const analyzeSentiment = async (texts) => {
                    setLoading(true);
                    setError(null);
                    setSummary(null);
                    setActionPlan(null);
                    
                    const systemPrompt = `Analyze customer reviews with cinematic precision. Return JSON with 'results' array. Each item MUST have: id (unique), sentiment (positive, negative, neutral, mixed), confidenceScores (object with positive, neutral, negative floats summing to 1), keyPhrases (array), category (string), suggestedReply (string), reasoning (string).`;
                    const userQuery = `Ingest Document Corpus: ${JSON.stringify(texts.map((t, i) => ({ id: i, text: t }))) }`;

                    try {
                        const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: userQuery }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] },
                                generationConfig: { responseMimeType: "application/json" }
                            })
                        });

                        const data = await response.json();
                        const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text || "{}";
                        const content = JSON.parse(rawText);
                        
                        if (content.results) {
                            setResults(content.results.map((r, i) => ({ ...r, originalText: texts[i] })));
                            setActiveTab('results');
                            window.scrollTo({ top: 0, behavior: 'smooth' });
                        }
                    } catch (err) {
                        setError("Communication Fault. Data stream interrupted.");
                    } finally { setLoading(false); }
                };

                const generateExecutiveSummary = async () => {
                    if (!results.length) return;
                    setLoadingSummary(true);
                    const systemPrompt = `Act as a High-Level Intelligence Officer. Synthesize these sentiment results into a noir-style manifesto summary. Return JSON: overallTrend (string), keyStrengths (array), painPoints (array), strategicAdvice (string). Results: ${JSON.stringify(results)}`;
                    
                    try {
                        const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: "Synthesize report" }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] },
                                generationConfig: { responseMimeType: "application/json" }
                            })
                        });
                        const data = await response.json();
                        const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text || "{}";
                        const content = JSON.parse(rawText);
                        setSummary(content);
                    } catch (err) { setError("Synthesis failed."); } 
                    finally { setLoadingSummary(false); }
                };

                const generateActionPlan = async () => {
                    if (!summary) return;
                    setLoadingActions(true);
                    const systemPrompt = `Based on the Executive Summary provided, generate a tactical action plan. Return JSON: actions (array of objects with 'priority' [High/Medium/Low], 'task' [string], and 'impact' [string]). Summary: ${JSON.stringify(summary)}`;
                    
                    try {
                        const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: "Generate tactical tasks" }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] },
                                generationConfig: { responseMimeType: "application/json" }
                            })
                        });
                        const data = await response.json();
                        const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text || "{}";
                        const content = JSON.parse(rawText);
                        setActionPlan(content.actions);
                    } catch (err) { setError("Tactical extraction failed."); } 
                    finally { setLoadingActions(false); }
                };

                const refineResponse = async (index) => {
                    const target = results[index];
                    setRefiningId(index);
                    const systemPrompt = `Refine this customer response to be more professional, empathetic, and aligned with a sophisticated 'Noir' brand voice. Return JSON with 'refinedReply' string. Original text: "${target.originalText}". Previous reply: "${target.suggestedReply}"`;

                    try {
                        const response = await fetchWithRetry(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: "Refine tone" }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] },
                                generationConfig: { responseMimeType: "application/json" }
                            })
                        });
                        const data = await response.json();
                        const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text || "{}";
                        const content = JSON.parse(rawText);
                        const updatedResults = [...results];
                        updatedResults[index].suggestedReply = content.refinedReply;
                        setResults(updatedResults);
                    } catch (err) { console.error(err); } 
                    finally { setRefiningId(null); }
                };

                const stats = useMemo(() => {
                    if (!results.length) return null;
                    const counts = { positive: 0, negative: 0, neutral: 0, mixed: 0 };
                    const categories = {};
                    results.forEach(r => {
                        const s = r.sentiment?.toLowerCase() || 'neutral';
                        if (counts.hasOwnProperty(s)) counts[s]++;
                        const cat = r.category || 'General';
                        categories[cat] = (categories[cat] || 0) + 1;
                    });
                    return { counts, categories };
                }, [results]);

                return (
                    <div className="min-h-screen flex flex-col">
                        <nav className="fixed top-0 w-full z-50 px-8 py-10 flex justify-between items-center mix-diff">
                            <div className="flex items-center gap-4 text-white">
                                <span className="text-2xl font-black tracking-tighter uppercase">Noir.Analytics</span>
                                <span className="text-[10px] tracking-[0.4em] font-light opacity-50 uppercase mt-1">Intelligence Laboratory</span>
                            </div>
                            <div className="flex gap-10 items-center">
                                <button 
                                    onClick={() => analyzeSentiment(reviews.filter(r => r.trim()))}
                                    disabled={loading}
                                    className="group flex items-center gap-3"
                                >
                                    <span className={`text-sm font-bold uppercase tracking-widest transition-colors ${loading ? 'text-red-500' : 'hover:text-red-500'}`}>
                                        {loading ? 'Analyzing Corpus...' : 'Execute Analysis'}
                                    </span>
                                    <div className={`w-8 h-8 flex items-center justify-center border border-white/20 sharp-edge transition-all group-hover:border-red-500`}>
                                        {loading ? <LucideIconRenderer name="Loader2" className="w-4 h-4 animate-spin text-red-500" /> : <LucideIconRenderer name="ChevronRight" className="w-4 h-4 text-white" />}
                                    </div>
                                </button>
                            </div>
                        </nav>

                        <main className="flex-1">
                            <section className="min-h-[100vh] flex flex-col items-center justify-center pt-24 px-8 overflow-hidden">
                                <div 
                                    className="text-center transition-transform duration-75 ease-out will-change-transform"
                                    style={{ transform: `scale(${scrollScale})` }}
                                >
                                    <h1 className="text-[12vw] font-black leading-[0.8] uppercase mb-4 opacity-90 tracking-tighter text-white">
                                        Document <br/> <span className="italic font-thin text-[11vw]">Ingestion</span>
                                    </h1>
                                    <p className="text-sm font-light tracking-[0.5em] opacity-40 uppercase mb-12 text-white">Batch Processing Phase 01</p>
                                </div>

                                <div className="flex gap-12 border-b border-white/10 w-full max-w-4xl mb-12">
                                    {['input', 'results', 'stats'].map(tab => (
                                        <button
                                            key={tab}
                                            onClick={() => (tab === 'input' || results.length > 0) && setActiveTab(tab)}
                                            className={`pb-4 text-xs font-bold uppercase tracking-widest transition-all relative ${
                                                activeTab === tab 
                                                    ? 'text-white' 
                                                    : (tab !== 'input' && results.length === 0) ? 'text-white/10 cursor-not-allowed' : 'text-white/40 hover:text-white'
                                            }`}
                                        >
                                            {tab}
                                            {activeTab === tab && <div className="absolute bottom-[-1px] left-0 w-full h-[2px] bg-red-500" />}
                                        </button>
                                    ))}
                                </div>

                                <div className="w-full max-w-6xl mb-24">
                                    {error && (
                                        <div className="mb-12 p-6 border-l-4 border-red-500 bg-red-500/5 flex items-center gap-4 reveal-text">
                                            <LucideIconRenderer name="AlertTriangle" className="text-red-500 w-5 h-5" />
                                            <span className="text-xs font-bold uppercase tracking-widest text-red-200">{error}</span>
                                        </div>
                                    )}

                                    {activeTab === 'input' && (
                                        <div className="grid gap-1 reveal-text">
                                            {reviews.map((r, i) => (
                                                <div key={i} className="bg-zinc-900/40 border border-white/5 p-8 flex flex-col md:flex-row gap-8 transition-colors hover:border-white/20">
                                                    <div className="md:w-32 flex flex-col">
                                                        <span className="text-[10px] font-black text-white/20 uppercase tracking-[0.3em]">Entry</span>
                                                        <span className="text-3xl font-black text-white/10 italic">0{i+1}</span>
                                                    </div>
                                                    <textarea 
                                                        className="flex-1 bg-transparent border-none text-xl font-light text-white/80 placeholder:text-white/5 outline-none resize-none py-2 leading-relaxed" 
                                                        rows="2" 
                                                        value={r}
                                                        onChange={(e) => {
                                                            const next = [...reviews];
                                                            next[i] = e.target.value;
                                                            setReviews(next);
                                                        }}
                                                        placeholder="Awaiting customer narrative..."
                                                    />
                                                    <div className="flex flex-col justify-end">
                                                        {reviews.length > 1 && (
                                                            <button 
                                                                onClick={() => setReviews(reviews.filter((_, idx) => idx !== i))}
                                                                className="p-3 text-white/20 hover:text-red-500 transition-colors"
                                                            >
                                                                <LucideIconRenderer name="X" className="w-5 h-5" />
                                                            </button>
                                                        )}
                                                    </div>
                                                </div>
                                            ))}
                                            <button 
                                                onClick={() => setReviews([...reviews, ''])} 
                                                className="group py-12 border border-white/5 bg-zinc-950/20 text-white/20 hover:text-white hover:border-white/20 transition-all flex flex-col items-center justify-center gap-4"
                                            >
                                                <LucideIconRenderer name="Plus" className="w-6 h-6" />
                                                <span className="text-[10px] font-black uppercase tracking-[0.5em]">Expand Corpus</span>
                                            </button>
                                        </div>
                                    )}

                                    {activeTab === 'results' && (
                                        <div className="grid gap-2 reveal-text">
                                            <div className="mb-12">
                                                <h2 className="text-[8vw] font-black leading-none uppercase tracking-tighter text-white">
                                                    Selected <span className="italic font-thin text-[7vw]">Evidence</span>
                                                </h2>
                                            </div>

                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                                                {results.map((res, i) => (
                                                    <div key={i} className="group aspect-[16/10] relative bg-[#18181b] overflow-hidden">
                                                        <div className="absolute inset-0 opacity-10 noir-gradient transition-transform duration-700 group-hover:scale-110"></div>
                                                        
                                                        <div className={`absolute left-0 top-0 w-1 h-full z-10 ${
                                                            res.sentiment === 'positive' ? 'bg-emerald-500' :
                                                            res.sentiment === 'negative' ? 'bg-red-500' :
                                                            res.sentiment === 'mixed' ? 'bg-amber-500' : 'bg-white/20'
                                                        }`} />

                                                        <div className="relative z-20 h-full p-10 flex flex-col justify-between">
                                                            <div>
                                                                <div className="flex justify-between items-start mb-6">
                                                                    <span className="text-[10px] font-black uppercase tracking-widest text-white/30">Case ID: 0{i+1}</span>
                                                                    <span className="text-[10px] font-black uppercase tracking-widest text-white/60 bg-white/5 px-3 py-1">{res.category}</span>
                                                                </div>
                                                                <p className="text-2xl font-light italic leading-tight text-white/80 line-clamp-3">"{res.text}"</p>
                                                            </div>

                                                            <div className="transform translate-y-8 opacity-0 group-hover:translate-y-0 group-hover:opacity-100 transition-all duration-500">
                                                                <div className="flex flex-wrap gap-2 mb-6">
                                                                    {(res.keyPhrases || []).map((phrase, idx) => (
                                                                        <span key={idx} className="text-[10px] font-bold text-red-500/80 uppercase">#{phrase}</span>
                                                                    ))}
                                                                </div>
                                                                <div className="bg-white p-6 text-black flex justify-between items-center relative">
                                                                    <div className="flex-1 mr-4">
                                                                        <p className="text-[10px] font-black uppercase mb-1 opacity-40 tracking-widest">Recommended Action</p>
                                                                        <p className="text-xs font-bold leading-snug">{res.suggestedReply}</p>
                                                                    </div>
                                                                    <button 
                                                                        onClick={() => refineResponse(i)}
                                                                        disabled={refiningId === i}
                                                                        className="w-10 h-10 border border-black/10 flex items-center justify-center shrink-0 hover:bg-black hover:text-white transition-colors"
                                                                        title="Polish Tone"
                                                                    >
                                                                        {refiningId === i ? <LucideIconRenderer name="Loader2" className="animate-spin w-4 h-4" /> : <LucideIconRenderer name="Sparkles" className="w-5 h-5" />}
                                                                    </button>
                                                                </div>
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {activeTab === 'stats' && stats && (
                                        <div className="reveal-text space-y-2">
                                            <div className="bg-[#09090b] min-h-[80vh] flex flex-col items-center justify-start p-12 text-center overflow-y-auto custom-scroll">
                                                {!summary ? (
                                                    <div className="max-w-2xl mt-auto mb-auto">
                                                        <h2 className="text-5xl md:text-7xl font-black uppercase tracking-tighter mb-8 leading-[0.9] text-white">
                                                            Strategic <br/> <span className="italic font-thin">Manifesto</span>
                                                        </h2>
                                                        <button 
                                                            onClick={generateExecutiveSummary} 
                                                            disabled={loadingSummary}
                                                            className="px-12 py-5 border border-white/20 hover:border-red-500 hover:text-red-500 transition-all uppercase text-xs font-black tracking-[0.4em] text-white"
                                                        >
                                                            {loadingSummary ? 'Synthesizing...' : 'Generate Synthesis'}
                                                        </button>
                                                    </div>
                                                ) : (
                                                    <div className="w-full max-w-5xl text-left space-y-24">
                                                        <div>
                                                            <div className="flex justify-between items-start">
                                                                <h4 className="text-[10px] font-black uppercase tracking-[0.8em] text-white/20 mb-8">Executive Overview</h4>
                                                                <button 
                                                                    onClick={generateActionPlan}
                                                                    disabled={loadingActions}
                                                                    className="text-[10px] font-black uppercase tracking-[0.2em] bg-red-500 text-white px-4 py-2 hover:bg-red-600 transition-colors"
                                                                >
                                                                    {loadingActions ? 'Extracting...' : '✨ Generate Tactical Actions'}
                                                                </button>
                                                            </div>
                                                            <p className="text-4xl md:text-6xl font-medium leading-tight tracking-tight text-white">{summary.overallTrend}</p>
                                                            <div className="h-[2px] bg-white/10 mt-12 w-48 transition-all duration-1000" style={{ width: '100%', maxWidth: '320px' }}></div>
                                                        </div>

                                                        <div className="grid md:grid-cols-2 gap-24">
                                                            <div className="space-y-12">
                                                                <div>
                                                                    <h5 className="text-[10px] font-black uppercase text-red-500 mb-6 tracking-widest">Operational Strengths</h5>
                                                                    <ul className="space-y-4">
                                                                        {(summary.keyStrengths || []).map((s,i)=><li key={i} className="text-lg font-light italic opacity-80 border-b border-white/5 pb-2 text-white">/ {s}</li>)}
                                                                    </ul>
                                                                </div>
                                                                <div>
                                                                    <h5 className="text-[10px] font-black uppercase text-white/30 mb-6 tracking-widest">Market Friction</h5>
                                                                    <ul className="space-y-4">
                                                                        {(summary.painPoints || []).map((s,i)=><li key={i} className="text-lg font-light italic opacity-40 border-b border-white/5 pb-2 text-white">/ {s}</li>)}
                                                                    </ul>
                                                                </div>
                                                            </div>
                                                            <div className="bg-white p-12 text-black flex flex-col justify-between aspect-square">
                                                                <div className="space-y-4">
                                                                    <LucideIconRenderer name="Zap" className="w-10 h-10 mb-8" />
                                                                    <h5 className="text-[10px] font-black uppercase tracking-widest opacity-40">Strategic Advice</h5>
                                                                    <p className="text-2xl font-bold leading-tight">"{summary.strategicAdvice}"</p>
                                                                </div>
                                                                <div className="flex justify-between items-end border-t border-black/10 pt-8">
                                                                    <span className="text-[10px] font-black tracking-widest uppercase opacity-40">Section 04</span>
                                                                    <span className="text-4xl font-black italic tracking-tighter">01.01</span>
                                                                </div>
                                                            </div>
                                                        </div>

                                                        {actionPlan && (
                                                            <div className="pt-24 border-t border-white/10 reveal-text">
                                                                <h4 className="text-[10px] font-black uppercase tracking-[0.8em] text-white/20 mb-12">Tactical Action Plan</h4>
                                                                <div className="grid gap-6">
                                                                    {actionPlan.map((action, idx) => (
                                                                        <div key={idx} className="bg-zinc-900/40 border border-white/5 p-8 group hover:border-red-500 transition-all flex flex-col md:flex-row md:items-center justify-between gap-6">
                                                                            <div className="flex-1">
                                                                                <div className="flex items-center gap-4 mb-2">
                                                                                    <span className={`text-[9px] font-black uppercase tracking-widest px-2 py-1 ${
                                                                                        action.priority === 'High' ? 'bg-red-500 text-white' : 
                                                                                        action.priority === 'Medium' ? 'bg-white/10 text-white' : 'border border-white/20 text-white/40'
                                                                                    }`}>
                                                                                        {action.priority}
                                                                                    </span>
                                                                                    <span className="text-[10px] font-black uppercase tracking-widest text-white/20 italic">Task {idx + 1}</span>
                                                                                </div>
                                                                                <p className="text-xl font-light text-white leading-snug">{action.task}</p>
                                                                            </div>
                                                                            <div className="md:w-64">
                                                                                 <p className="text-[10px] font-black uppercase tracking-widest text-white/40 mb-1">Projected Impact</p>
                                                                                 <p className="text-xs text-white italic">{action.impact}</p>
                                                                            </div>
                                                                        </div>
                                                                    ))}
                                                                </div>
                                                            </div>
                                                        )}
                                                    </div>
                                                )}
                                            </div>

                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
                                                <div className="bg-zinc-900/40 border border-white/5 p-12">
                                                    <h4 className="text-[10px] font-black uppercase text-white/20 mb-12 tracking-widest">Sentiment Distribution</h4>
                                                    <div className="flex items-end justify-between h-32 gap-4">
                                                        {Object.entries(stats.counts).map(([label, count]) => (
                                                            <div key={label} className="flex-1 flex flex-col items-center">
                                                                <div 
                                                                    className={`w-full transition-all duration-1000 ${
                                                                        label === 'positive' ? 'bg-emerald-500/80' : 
                                                                        label === 'negative' ? 'bg-red-500/80' : 
                                                                        label === 'mixed' ? 'bg-amber-500/80' : 'bg-white/10'
                                                                    }`}
                                                                    style={{ height: `${(count / results.length) * 100}%`, minHeight: '4px' }}
                                                                ></div>
                                                                <span className="text-[9px] font-bold uppercase mt-4 text-white/20">{label}</span>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                                <div className="bg-zinc-900/40 border border-white/5 p-12">
                                                    <h4 className="text-[10px] font-black uppercase text-white/20 mb-12 tracking-widest">Classification Nodes</h4>
                                                    <div className="space-y-4">
                                                        {Object.entries(stats.categories).map(([cat, count]) => (
                                                            <div key={cat} className="group">
                                                                <div className="flex justify-between text-[10px] font-bold mb-2 uppercase tracking-widest">
                                                                    <span className="text-white/40">{cat}</span>
                                                                    <span className="text-red-500">{count}</span>
                                                                </div>
                                                                <div className="h-[1px] bg-white/10 w-full overflow-hidden">
                                                                    <div className="h-full bg-white/40 transition-all duration-1000" style={{ width: `${(count / results.length) * 100}%` }}></div>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </div>
                            </section>
                        </main>

                        <footer className="bg-white text-black pt-24 pb-12 px-8">
                            <div className="border-b border-black/10 pb-12 mb-12">
                                <h2 className="text-[12vw] font-black leading-[0.75] uppercase tracking-tighter">
                                    Start A <span className="italic font-thin text-[11vw]">Project</span>
                                </h2>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-12 text-[10px] font-black uppercase tracking-[0.3em]">
                                <div className="flex flex-col gap-4">
                                    <span className="opacity-40">Social / Connection</span>
                                    <div className="flex flex-col gap-2">
                                        <a href="#" className="hover:text-red-500 transition-colors underline decoration-black/10 underline-offset-4">Instagram</a>
                                        <a href="#" className="hover:text-red-500 transition-colors underline decoration-black/10 underline-offset-4">LinkedIn</a>
                                        <a href="#" className="hover:text-red-500 transition-colors underline decoration-black/10 underline-offset-4">Twitter</a>
                                    </div>
                                </div>
                                <div className="flex flex-col gap-4">
                                    <span className="opacity-40">Enquiries</span>
                                    <span className="text-2xl font-bold tracking-tight lowercase">intelligence@noir.analytics</span>
                                </div>
                                <div className="flex flex-col justify-end items-end gap-2 text-right opacity-30">
                                    <span>© 2026 Noir Intelligence Lab.</span>
                                    <span>All Theoretical Rights Reserved.</span>
                                </div>
                            </div>
                        </footer>
                    </div>
                );
            }

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        })();
    </script>
</body>
